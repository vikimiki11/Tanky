<!DOCTYPE html>
<html style="image-rendering: pixelated;">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="img/icon.png">
  <style>
    body{
      margin: 0;
      display: flex;
      width: 100vw;
      max-width: 1900px;
      height: 100vh;
      position: relative;
    }
    canvas {
      width: 100%;
    }
    .hracipole{
      position:relative;
    }
    .tank{
      background-image: url("img/tank.png");
      background-size: cover;
      height: 37.5em;
      width: 75em;
      position:absolute;
      transform:translate(-50%,-100%);
      transform-origin: 0% 0%;
    }
    .cannon{
      background-color:black;
      height: 5em;
      width: 27em;
      position:absolute;
      transform:translate(10.5em,6em);
      transform-origin: 37.5em 8.5em;
    }
    .kulka{
      width: 3em;
      height: 3em;
      background-color: red;
      position: absolute;
    }
    aside{
      width: 20rem;
      display: grid;
      grid-template-columns: auto;
      border: solid 1px black;
      border-top: 0px;
      height: 99%;
      grid-template-rows: 3rem auto 3rem
    }
    input{
      border: black solid 0.5rem;
      padding: 0.25rem;
    }
    .switchg{
      padding: 1rem;
      text-align: center;
      display: block;
      border-bottom: 1px solid black;
      background-image: url("img/globalchat.jpg");
      background-size: cover;
      color: white;
    }
    .switchl{
      padding: 1rem;
      text-align: center;
      display: block;
      border-bottom: 1px solid black;
      background-image: url("img/localchat.jpg");
      background-size: cover;
      background-position: center;
      color: white;
    }
  </style>
</head>
<body onresize="document.querySelector('.hracipole').style.fontSize=(document.querySelector('.hracipole').offsetWidth/1600)+'px';document.querySelector('body').style.left=((window.innerWidth-document.querySelector('main').offsetWidth-document.querySelector('aside').offsetWidth)/2)+'px'" onload="document.querySelector('.hracipole').style.fontSize=(document.querySelector('.hracipole').offsetWidth/1600)+'px';document.querySelector('body').style.left=((window.innerWidth-document.querySelector('main').offsetWidth-document.querySelector('aside').offsetWidth)/2)+'px'">
  <main>
    <div class="hracipole">
      <canvas id="Canvas"></canvas>
      <div class="tanky"></div>
    </div>
  </main>
  <aside>
    <div class="switchg" onclick='if(this.className=="switchg"){this.className="switchl";this.innerHTML="Local chat"}else{this.className="switchg";this.innerHTML="Global chat"}'>Global chat</div>
    <div></div>
    <input type="text">
  </aside>
  <script src="perlin.js"></script>
  <script src="js.js"></script>
</body>
</html>
