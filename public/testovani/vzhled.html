<!DOCTYPE html>
<html style="image-rendering: pixelated;">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="img/icon.png">
  <style>
    body{
      margin: 0;
      display: flex;
      width: 100vw;
      max-width: 1900px;
      height: 100vh;
      position: relative;
    }
    main{
      position: relative;
    }
    canvas {
      width: 100%;
    }
    .hracipole{
      position:relative;
      display: none;
    }
    .tank{
      background-image: url("img/tankp.png");
      background-size: cover;
      height: 37.5em;
      width: 75em;
      position:absolute;
      transform:translate(-50%,-100%);
      transform-origin: 0% 0%;
    }
    .tree{
      position:absolute;
      transform:translate(-50%,-100%);
      height: 65em;
      width: auto;
    }
    .cannon{
      background-color:black;
      height: 5em;
      width: 27em;
      position:absolute;
      transform:translate(10.5em,6em);
      transform-origin: 37.5em 8.5em;
    }
    .kulka{
      width: 3em;
      height: 3em;
      background-color: red;
      position: absolute;
    }
    aside{
      width: 20rem;
      display: grid;
      grid-template-columns: auto;
      border: solid 1px black;
      border-top: 0px;
      height: 99%;
      grid-template-rows: 3rem auto 3rem
    }
    input{
      border: black solid 0.5rem;
      padding: 0.25rem;
    }
    .switchg{
      padding: 1rem;
      text-align: center;
      display: block;
      border-bottom: 1px solid black;
      background-image: url("img/globalchat.jpg");
      background-size: cover;
      color: white;
    }
    .switchl{
      padding: 1rem;
      text-align: center;
      display: block;
      border-bottom: 1px solid black;
      background-image: url("img/localchat.jpg");
      background-size: cover;
      background-position: center;
      color: white;
    }
    ul.menu{
      display: inline-block;
      width: 20rem;
      margin: 2.5rem;
      padding-left: 0;
    }
    .upgrade{
      display: table;
      margin : auto;
      margin-top: -15rem;
      padding: 2rem;
      border: 1px solid grey;
      border-radius: 2rem;
      background-color: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      transition: margin-top 1s;
    }
    li{
      list-style-type: none;
      border: 1px solid black ;
      border-bottom: 0px solid black ;
    }
    ul :last-child{
      border-bottom: 1px solid black ;
    }
    @media screen and (max-width: 510px) {
      body {
        background-color: lightgreen;
      }
    }
    .gamelobby{
      max-width: 1600px;
      width: 100vw;
    }
    .centr{
      display: table;
      margin-left : auto;
      margin-right : auto;
    }
    .seznamhraci{
      background-color: #EAEFF3;
      border: 2px solid grey ;
      margin-top: 2rem;
    }
    #seznamhracu{
      display: table;
      margin-left : auto;
      margin-right : auto;
    }
    p.alert:hover{
      opacity: 1 !important;
    }
  </style>
</head>
<body onresize="document.querySelector('.hracipole').style.fontSize=(document.querySelector('.hracipole').offsetWidth/1600)+'px';document.querySelector('body').style.left=((window.innerWidth-document.querySelector('main').offsetWidth-document.querySelector('aside').offsetWidth)/2)+'px'" onload="document.querySelector('.hracipole').style.fontSize=(document.querySelector('.hracipole').offsetWidth/1600)+'px';document.querySelector('body').style.left=((window.innerWidth-document.querySelector('main').offsetWidth-document.querySelector('aside').offsetWidth)/2)+'px'">
  <main>
    <div class="hracipole">
      <canvas id="Canvas"></canvas>
      <div class="tanky"></div>
      <div class="stromy"></div>
    </div>
    <div class="centr gamelobby">
      <div class="centr seznamhraci">
        <ul class="menu centr" id="seznamhracu">
          <li>1</li>
          <li>2</li>
        </ul>
        <div class="taemhraci centr">
          <ul class="menu" id="team1">
            <li>1</li>
            <li>2</li>
          </ul>
          <ul class="menu" id="team2">
            <li>1</li>
            <li>2</li>
          </ul>
        </div>
      </div>
      <div style="width: 40rem;height: 20rem;padding: 0.5rem;margin: 0.5rem auto;background-color:#EAEFF3;border: 2px solid grey ;">
        <p style="text-align: center;font-weight: bold;">Můžeš také poslat invite a zahrát si s ním.</p>
        <input class="centr" style="width: 98%;border-width: 2px;border-style: inset;border-color: -internal-light-dark-color(rgb(118, 118, 118), rgb(195, 195, 195));border-image: initial;" id="inviteinput">
        <ul id="members" style="height: 12rem;width: 100%;overflow-y: auto;">
        </ul>
      </div>
      <div style="width: 100%;position: absolute;top:0">
        <div class="upgrade">
          <ul class="menu" id="nabojemenu">
            <li>1</li>
            <li>2</li>
          </ul>
          <ul class="menu" id="upgrademenu">
            <li>1</li>
            <li>2</li>
          </ul>
        </div>
      </div>
    </div>
  </main>
  <aside>
    <div class="switchg" onclick='if(this.className=="switchg"){this.className="switchl";this.innerHTML="Local chat"}else{this.className="switchg";this.innerHTML="Global chat"}'>Global chat</div>
    <div></div>
    <input type="text">
  </aside>
  <p class="alert" style="position: absolute;left: 0;top: 0em;margin: 3rem;background-color: white;padding: 1rem;" onmouseleave="opal=1" onmousemove="opal=1">
  </p>
  <script src="https://code.jquery.com/jquery-1.10.2.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="perlin.js"></script>
  <script src="js.js"></script>
</body>
</html>
