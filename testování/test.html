<!DOCTYPE html>
<html style="image-rendering: pixelated;">

<head>
  <meta charset="utf-8" />
  <script src="perlin.js"></script>
  <style>
    canvas {
      height: 400px;
      width: 800px;
    }

    .hracipole{
    border: 1px solid #ccc;
    height: 400px;
    width: 800px;
    position:relative;
    }
    .tank{
    background-color:red;
    height: 25px;
    width: 50px;
    position:absolute;
    transform:translate(-50%,-100%);
    transform-origin: 0% 0%;
    }
    .cannon{
    background-color:black;
    height: 3px;
    width: 15px;
    position:absolute;
    transform:translate(11px,6px);
    transform-origin: 25px 7.5px;
    }
  </style>
</head>

<body>
  <div class="hracipole">
    <canvas id="Canvas"></canvas>
    <div class="tanky"></div>
  </div>
  <button id="Generace">Generovat</button>
  <button id="Akt">Aktualzovat terén</button>
  <script src="js.js"></script>
</body>
</html>
